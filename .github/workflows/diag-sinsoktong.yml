name: 진단 — 신속통합기획 크롤링 가능 여부

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: 신속통합기획 페이지 접근성 진단
        run: node scripts/diag-sinsoktong.js
